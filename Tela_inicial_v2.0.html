<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cronoanálise</title>

<style>
    :root {
        --bg-color: #121212;
        --card-bg: #1e1e1e;
        --text-main: #ffffff;
        --text-muted: #a0a0a0;
        --border: #333333;
        --blue: #007bff;
        --green: #28a745;
        --orange: #fd7e14;
        --purple: #8e44ad;
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg-color);
        color: var(--text-main);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 18px;
    }

    .main-wrap {
        display: flex;
        flex-direction: column;
        justify-content: center;
        flex: 1;
        width: 100%;
        max-width: 420px;
        margin: 0 auto;
    }

    .hero {
        margin-bottom: 28px;
        text-align: center;
    }

    .title-row {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 14px;
    }

    .title-row h1 {
        margin: 0;
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: 0.4px;
    }

    .timer-icon {
        width: 20px;
        height: 20px;
        fill: var(--text-muted);
        opacity: 0.9;
        animation: pulseIcon 1.8s ease-in-out infinite;
    }

    @keyframes pulseIcon {
        0%, 100% { transform: scale(1); opacity: 0.75; }
        50% { transform: scale(1.08); opacity: 1; }
    }

    .mini-gantt-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
    }

    .mini-gantt {
        width: 100%;
        max-width: 260px;
        height: 18px;
        display: flex;
        gap: 4px;
        align-items: stretch;
    }

    .mini-block {
        flex: 1;
        border-radius: 4px;
        opacity: 0.18;
        transform: scaleY(0.92);
        animation: fillPulse 2.8s infinite ease-in-out;
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }

    .mini-block:nth-child(1) { background: var(--blue);   animation-delay: 0s;   flex: 1.2; }
    .mini-block:nth-child(2) { background: var(--orange); animation-delay: 0.2s; flex: 0.9; }
    .mini-block:nth-child(3) { background: var(--green);  animation-delay: 0.4s; flex: 1.5; }
    .mini-block:nth-child(4) { background: var(--purple); animation-delay: 0.6s; flex: 0.8; }
    .mini-block:nth-child(5) { background: var(--blue);   animation-delay: 0.8s; flex: 1.1; }

    @keyframes fillPulse {
        0%, 100% {
            opacity: 0.18;
            transform: scaleY(0.92);
            filter: brightness(0.85);
        }
        35% {
            opacity: 1;
            transform: scaleY(1);
            filter: brightness(1.08);
        }
    }

    .mini-legend {
        font-size: 0.75rem;
        color: var(--text-muted);
        letter-spacing: 0.05em;
        text-transform: uppercase;
    }

    .menu-card {
        background: var(--card-bg);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 6px 16px rgba(0,0,0,0.28);
        border: 1px solid rgba(255,255,255,0.03);
    }

    .options {
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    .option-row {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .option-btn {
        flex: 1;
        border: none;
        border-radius: 12px;
        padding: 18px 16px;
        font-size: 1.08rem;
        font-weight: 700;
        color: white;
        cursor: pointer;
        transition: transform 0.12s ease, opacity 0.12s ease;
        text-transform: uppercase;
        letter-spacing: 0.3px;
    }

    .option-btn:active { transform: scale(0.98); }

    .btn-maquina { background: var(--blue); }
    .btn-operacional { background: var(--green); }
    .btn-multi { background: var(--orange); }

    .info-btn {
        width: 36px;
        height: 36px;
        min-width: 36px;
        border-radius: 50%;
        border: 1px solid #666;
        background: #2a2a2a;
        color: #fff;
        font-size: 1rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        user-select: none;
    }

    .info-btn:active { transform: scale(0.96); }

    .branding {
        text-align: center;
        margin-top: 24px;
        margin-bottom: 10px;
        font-size: 0.85rem;
        color: var(--text-muted);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        line-height: 1.25;
    }

    .linkedin-link {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        color: #1e7be7;
        text-decoration: none;
        font-weight: 700;
    }

    .linkedin-link svg {
        width: 14px;
        height: 14px;
        fill: currentColor;
        display: inline-block;
        vertical-align: middle;
    }

    .role-text {
        color: var(--text-muted);
    }

    .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.78);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
        z-index: 999;
    }

    .modal-content {
        width: 100%;
        max-width: 360px;
        background: #1f1f1f;
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .modal-title {
        margin: 0 0 12px 0;
        font-size: 1.05rem;
        color: #fff;
    }

    .modal-text {
        margin: 0;
        color: #d0d0d0;
        line-height: 1.45;
        font-size: 0.95rem;
    }

    .modal-close {
        margin-top: 16px;
        width: 100%;
        border: none;
        border-radius: 10px;
        padding: 12px;
        font-size: 0.95rem;
        font-weight: 700;
        background: var(--blue);
        color: white;
        cursor: pointer;
    }

/* v2.0 — badge de versão */
body { position: relative; }
.app-version { position: absolute; top: 10px; right: 12px; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); opacity: 0.9; pointer-events: none; }
</style>
</head>
<body>
<div class="app-version" id="appVersion">v2.0</div>

<div class="main-wrap">
    <div class="hero">
        <div class="title-row">
            <h1>Cronoanálise</h1>
            <svg class="timer-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M15 1H9v2h6V1zm-3 4a9 9 0 100 18 9 9 0 000-18zm0 16a7 7 0 110-14 7 7 0 010 14zm-.5-11h1.5v5l4 2.5-.75 1.23L11.5 15V10z"/>
            </svg>
        </div>

        <div class="mini-gantt-wrap">
            <div class="mini-gantt" aria-hidden="true">
                <div class="mini-block"></div>
                <div class="mini-block"></div>
                <div class="mini-block"></div>
                <div class="mini-block"></div>
                <div class="mini-block"></div>
            </div>
            <div class="mini-legend">tempo • sequência • análise</div>
        </div>
    </div>

    <div class="menu-card">
        <div class="options">
            <div class="option-row">
                <button class="option-btn btn-maquina" onclick="goTo('maquina')">
                    ⚙️ Máquina
                </button>
                <div class="info-btn" onclick="openInfo('maquina')" aria-label="Informações sobre Máquina">i</div>
            </div>

            <div class="option-row">
                <button class="option-btn btn-operacional" onclick="goTo('operacional')">
                    🧍 Operacional
                </button>
                <div class="info-btn" onclick="openInfo('operacional')" aria-label="Informações sobre Operacional">i</div>
            </div>

            <div class="option-row">
                <button class="option-btn btn-multi" onclick="goTo('multi')">
                    ⏱️ Multi cronômetro
                </button>
                <div class="info-btn" onclick="openInfo('multi')" aria-label="Informações sobre Multi cronômetro">i</div>
            </div>
        </div>
    </div>
</div>

<div class="branding">
    <span>Desenvolvido por 
        <a href="https://www.linkedin.com/in/pedro-ag-portela/" target="_blank" rel="noopener" class="linkedin-link">
            <svg viewBox="0 0 24 24">
                <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
            </svg>
            Pedro Portela
        </a>
    </span>
    <span class="role-text">Especialista de Processos Industriais & Black Belt</span>
</div>

<div class="modal-overlay" id="infoModal">
    <div class="modal-content">
        <h3 class="modal-title" id="infoTitle">Informação</h3>
        <p class="modal-text" id="infoText">Texto</p>
        <button class="modal-close" onclick="closeInfo()">Fechar</button>
    </div>
</div>

<script>
    function goTo(tipo) {
        alert("Depois vamos conectar esta opção ao HTML de " + tipo + ".");
    }

    function openInfo(tipo) {
        const title = document.getElementById('infoTitle');
        const text = document.getElementById('infoText');
        const modal = document.getElementById('infoModal');

        if (tipo === 'maquina') {
            title.innerText = '⚙️ Máquina';
            text.innerText = 'Usado para cronoanálise focada em ciclos de máquina. Mede tempos de ciclo, variação entre amostras, estabilidade, capacidade estimada, eficiência e gera relatório técnico com resumo executivo.';
        } else if (tipo === 'operacional') {
            title.innerText = '🧍 Operacional';
            text.innerText = 'Usado para cronoanálise operacional de atividades humanas, máquina e espera. Mede a sequência das etapas, tempos por elemento, classificação VA, NVA e BNVA e gera relatório visual para análise de balanceamento.';
        } else {
            title.innerText = '⏱️ Multi cronômetro';
            text.innerText = 'Usado para acompanhar múltiplos tempos ao mesmo tempo. Ideal para comparar operações paralelas, postos simultâneos, testes concorrentes ou monitoramento de várias atividades em uma única tela.';
        }

        modal.style.display = 'flex';
    }

    function closeInfo() {
        document.getElementById('infoModal').style.display = 'none';
    }
</script>

</body>
</html>
