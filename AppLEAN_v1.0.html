<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cronoanálise</title>

<style>
    :root {
        --bg-color: #121212;
        --card-bg: #1e1e1e;
        --text-main: #ffffff;
        --text-muted: #a0a0a0;
        --border: #333333;
        --blue: #007bff;
        --green: #28a745;
        --orange: #fd7e14;
        --purple: #8e44ad;
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        min-height: 100vh;
        height: 100vh;
        overflow: hidden;
        background: var(--bg-color);
        color: var(--text-main);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        gap: 8px;
        padding: 4px 12px 6px;
    }

    .main-wrap {
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        flex: 0 1 auto;
        min-height: 0;
        width: 100%;
        max-width: 420px;
        margin: 10px auto 0;
        padding-top: 0;
    }

    .hero {
        margin-bottom: 8px;
        text-align: center;
    }

    .title-row {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 6px;
    }

    .title-row h1 {
        margin: 0;
        font-size: 1.85rem;
        font-weight: 700;
        letter-spacing: 0.4px;
    }

    .timer-icon {
        width: 20px;
        height: 20px;
        fill: var(--text-muted);
        opacity: 0.9;
        animation: pulseIcon 1.8s ease-in-out infinite;
    }

    @keyframes pulseIcon {
        0%, 100% { transform: scale(1); opacity: 0.75; }
        50% { transform: scale(1.08); opacity: 1; }
    }

    .mini-gantt-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
    }

    .mini-gantt {
        width: 100%;
        max-width: 260px;
        height: 16px;
        display: flex;
        gap: 2px;
        align-items: stretch;
    }

    .mini-block {
        flex: 1;
        border-radius: 4px;
        opacity: 0.18;
        transform: scaleY(0.92);
        animation: fillPulse 2.8s infinite ease-in-out;
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }

    .mini-block:nth-child(1) { background: var(--blue);   animation-delay: 0s;   flex: 1.2; }
    .mini-block:nth-child(2) { background: var(--orange); animation-delay: 0.2s; flex: 0.9; }
    .mini-block:nth-child(3) { background: var(--green);  animation-delay: 0.4s; flex: 1.5; }
    .mini-block:nth-child(4) { background: var(--purple); animation-delay: 0.6s; flex: 0.8; }
    .mini-block:nth-child(5) { background: var(--blue);   animation-delay: 0.8s; flex: 1.1; }

    @keyframes fillPulse {
        0%, 100% {
            opacity: 0.18;
            transform: scaleY(0.92);
            filter: brightness(0.85);
        }
        35% {
            opacity: 1;
            transform: scaleY(1);
            filter: brightness(1.08);
        }
    }

    .mini-legend {
        font-size: 0.7rem;
        color: var(--text-muted);
        letter-spacing: 0.05em;
        text-transform: uppercase;
    }

    .menu-card {
        background: var(--card-bg);
        border-radius: 16px;
        padding: 14px;
        box-shadow: 0 6px 16px rgba(0,0,0,0.28);
        border: 1px solid rgba(255,255,255,0.03);
    }

    .options {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .option-row {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .option-btn {
        position: relative;
        flex: 1;
        border: none;
        border-radius: 12px;
        padding: 22px 14px 17px 14px;
        font-size: 1.08rem;
        font-weight: 700;
        color: white;
        cursor: pointer;
        transition: transform 0.12s ease, opacity 0.12s ease;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        text-align: left;
    }

    .btn-badge {
        position: absolute;
        top: 8px;
        right: 10px;
        font-size: 0.62rem;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.88);
        background: rgba(0,0,0,0.18);
        border: 1px solid rgba(255,255,255,0.16);
        border-radius: 999px;
        padding: 2px 6px;
        line-height: 1.1;
        pointer-events: none;
    }

    .option-btn:active { transform: scale(0.98); }

    .btn-maquina { background: var(--blue); }
    .btn-operacional { background: var(--green); }
    .btn-multi { background: var(--orange); }
    .btn-trabalho-padrao { background: var(--purple); }
    .btn-oee { background: #0f766e; }

    .info-btn {
        width: 34px;
        height: 34px;
        min-width: 34px;
        border-radius: 50%;
        border: 1px solid #666;
        background: #2a2a2a;
        color: #fff;
        font-size: 1rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        user-select: none;
    }

    .info-btn:active { transform: scale(0.96); }

    .branding {
        text-align: center;
        margin-top: 8px;
        margin-bottom: 2px;
        font-size: 0.85rem;
        color: var(--text-muted);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        line-height: 1.25;
    }

    .linkedin-link {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        color: #1e7be7;
        text-decoration: none;
        font-weight: 700;
    }

    .linkedin-link svg {
        width: 14px;
        height: 14px;
        fill: currentColor;
        display: inline-block;
        vertical-align: middle;
    }

    .role-text {
        color: var(--text-muted);
    }

    .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.78);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
        z-index: 999;
    }

    .modal-content {
        width: 100%;
        max-width: 360px;
        background: #1f1f1f;
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .modal-title {
        margin: 0 0 12px 0;
        font-size: 1.05rem;
        color: #fff;
    }

    .modal-text {
        margin: 0;
        color: #d0d0d0;
        line-height: 1.45;
        font-size: 0.95rem;
    }

    .modal-close {
        margin-top: 16px;
        width: 100%;
        border: none;
        border-radius: 10px;
        padding: 12px;
        font-size: 0.95rem;
        font-weight: 700;
        background: var(--blue);
        color: white;
        cursor: pointer;
    }

/* v2.0 — badge de versão */
body { position: relative; }
.app-version { position: absolute; top: 6px; right: 12px; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); opacity: 0.9; pointer-events: none; }


    .trial-panel {
        margin-top: 8px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 14px;
        padding: 9px 10px 8px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .trial-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 3px 8px;
        border-radius: 999px;
        background: rgba(253,126,20,0.16);
        border: 1px solid rgba(253,126,20,0.38);
        color: #ffbb80;
        font-size: 0.74rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
    }

    .trial-counter {
        font-size: 0.98rem;
        font-weight: 800;
        letter-spacing: 0.04em;
        color: #ffffff;
        text-align: center;
    }

    .trial-subtext {
        font-size: 0.75rem;
        line-height: 1.35;
        color: var(--text-muted);
        text-align: center;
        max-width: 320px;
    }

    .unlock-panel {
        width: 100%;
        margin-top: 4px;
        padding-top: 8px;
        border-top: 1px solid rgba(255,255,255,0.08);
    }

    .unlock-label {
        display: block;
        margin-bottom: 6px;
        font-size: 0.84rem;
        font-weight: 700;
        color: #f0f0f0;
        text-align: center;
    }

    .unlock-row {
        display: flex;
        gap: 8px;
    }

    .unlock-input {
        flex: 1;
        min-width: 0;
        border: 1px solid rgba(255,255,255,0.12);
        background: #121212;
        color: #ffffff;
        border-radius: 10px;
        padding: 10px 10px;
        font-size: 0.95rem;
        outline: none;
        text-transform: uppercase;
    }

    .unlock-input::placeholder {
        color: #777777;
        text-transform: none;
    }

    .unlock-btn {
        border: none;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 0.9rem;
        font-weight: 800;
        background: var(--green);
        color: #ffffff;
        cursor: pointer;
        white-space: nowrap;
    }

    .unlock-msg {
        min-height: 18px;
        margin-top: 8px;
        font-size: 0.8rem;
        text-align: center;
        color: var(--text-muted);
    }

    .unlock-msg.error { color: #ff8f8f; }
    .unlock-msg.success { color: #8be28b; }

    body.expired .option-btn,
    body.expired .info-btn {
        opacity: 0.55;
    }


    /* ===== APP OVERLAY ===== */
    #appOverlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: #000;
        flex-direction: column;
    }
    #appOverlay.visible { display: flex; }
    #backBar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        background: #111;
        border-bottom: 1px solid #333;
        flex-shrink: 0;
        min-height: 44px;
    }
    #backBtn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: none;
        background: rgba(255,255,255,0.1);
        color: #fff;
        border-radius: 8px;
        padding: 6px 14px;
        font-size: 0.9rem;
        font-weight: 700;
        cursor: pointer;
    }
    #backBtn:active { background: rgba(255,255,255,0.2); }
    #appLabel { font-size: 0.85rem; color: #aaa; font-weight: 600; }
    #appFrame { flex: 1; border: none; width: 100%; min-height: 0; }

</style>
</head>
<body>
<div class="app-version" id="appVersion">v2.0</div>

<div class="main-wrap">
    <div class="hero">
        <div class="title-row">
            <h1>Cronoanálise</h1>
            <svg class="timer-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M15 1H9v2h6V1zm-3 4a9 9 0 100 18 9 9 0 000-18zm0 16a7 7 0 110-14 7 7 0 010 14zm-.5-11h1.5v5l4 2.5-.75 1.23L11.5 15V10z"/>
            </svg>
        </div>

        <div class="mini-gantt-wrap">
            <div class="mini-gantt" aria-hidden="true">
                <div class="mini-block"></div>
                <div class="mini-block"></div>
                <div class="mini-block"></div>
                <div class="mini-block"></div>
                <div class="mini-block"></div>
            </div>
            <div class="mini-legend">tempo • sequência • análise</div>
        </div>

        <div class="trial-panel" id="trialPanel">
            <div class="trial-chip" id="trialStatus">App em teste</div>
            <div class="trial-counter" id="trialCountdown">14 dias</div>
            <div class="trial-subtext" id="trialMessage">Versão temporária liberada por 14 dias.</div>

            <div class="unlock-panel" id="unlockPanel" hidden>
                <label class="unlock-label" for="unlockPassword">Insira a senha para liberar o app</label>
                <div class="unlock-row">
                    <input
                        class="unlock-input"
                        id="unlockPassword"
                        type="password"
                        placeholder="Digite a senha"
                        autocomplete="off"
                        autocapitalize="characters"
                        spellcheck="false"
                    >
                    <button class="unlock-btn" type="button" onclick="unlockApp()">Liberar</button>
                </div>
                <div class="unlock-msg" id="unlockMessage"></div>
            </div>
        </div>
    </div>

    <div class="menu-card">
        <div class="options">
            <div class="option-row">
                <button class="option-btn btn-maquina" onclick="handleAction('maquina')">
                    ⚙️ Máquina
                    <span class="btn-badge">(v2.0)</span>
                </button>
                <div class="info-btn" onclick="handleInfo('maquina')" aria-label="Informações sobre Máquina">i</div>
            </div>

            <div class="option-row">
                <button class="option-btn btn-operacional" onclick="handleAction('operacional')">
                    🧍 Operacional
                    <span class="btn-badge">(v2.0)</span>
                </button>
                <div class="info-btn" onclick="handleInfo('operacional')" aria-label="Informações sobre Operacional">i</div>
            </div>

            <div class="option-row">
                <button class="option-btn btn-multi" onclick="handleAction('multi')">
                    ⏱️ Multi cronômetro
                    <span class="btn-badge">(v2.0)</span>
                </button>
                <div class="info-btn" onclick="handleInfo('multi')" aria-label="Informações sobre Multi cronômetro">i</div>
            </div>

            <div class="option-row">
                <button class="option-btn btn-trabalho-padrao" onclick="handleAction('trabalho-padrao')">
                    📸 Trabalho padrão
                    <span class="btn-badge">(EM BREVE)</span>
                </button>
                <div class="info-btn" onclick="handleInfo('trabalho-padrao')" aria-label="Informações sobre Trabalho padrão">i</div>
            </div>

            <div class="option-row">
                <button class="option-btn btn-oee" onclick="handleAction('oee')">
                    📈 Calculadora de OEE
                    <span class="btn-badge">(EM BREVE)</span>
                </button>
                <div class="info-btn" onclick="handleInfo('oee')" aria-label="Informações sobre Calculadora de OEE">i</div>
            </div>
        </div>
    </div>
</div>

<div class="branding">
    <span>Desenvolvido por 
        <a href="https://www.linkedin.com/in/pedro-ag-portela/" target="_blank" rel="noopener" class="linkedin-link">
            <svg viewBox="0 0 24 24">
                <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>

            Pedro Portela
        </a>
    </span>
    <span class="role-text">Especialista de Processos Industriais & Black Belt</span>
</div>

<div class="modal-overlay" id="infoModal">
    <div class="modal-content">
        <h3 class="modal-title" id="infoTitle">Informação</h3>
        <p class="modal-text" id="infoText">Texto</p>
        <button class="modal-close" onclick="closeInfo()">Fechar</button>
    </div>
</div>


<script>
    const APP_TRIAL_START = '2026-04-03T12:00:00-03:00';
    const APP_TRIAL_DURATION_DAYS = 14;
    const APP_UNLOCK_PASSWORD = 'AZEITONA';
    const STORAGE_KEY_UNLOCK = 'cronoanalise_trial_unlock_v2_0';
    const TRIAL_END_MS = new Date(APP_TRIAL_START).getTime() + (APP_TRIAL_DURATION_DAYS * 24 * 60 * 60 * 1000);

    let isUnlocked = localStorage.getItem(STORAGE_KEY_UNLOCK) === '1';

    function isExpired() {
        return Date.now() >= TRIAL_END_MS;
    }

    function updateTrialUI() {
        const now = Date.now();
        const expired = isExpired();
        const countdownEl = document.getElementById('trialCountdown');
        const statusEl = document.getElementById('trialStatus');
        const messageEl = document.getElementById('trialMessage');
        const unlockPanel = document.getElementById('unlockPanel');

        if (!expired) {
            const remainingMs = Math.max(TRIAL_END_MS - now, 0);
            const totalSeconds = Math.floor(remainingMs / 1000);
            const days = Math.floor(totalSeconds / 86400);
            const hours = Math.floor((totalSeconds % 86400) / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            countdownEl.textContent = `${days}d ${String(hours).padStart(2, '0')}h ${String(minutes).padStart(2, '0')}m ${String(seconds).padStart(2, '0')}s`;
            statusEl.textContent = 'APP EM TESTE';
            messageEl.textContent = 'Versão temporária liberada por 14 dias. Após o vencimento, o acesso será liberado somente com senha.';
            unlockPanel.hidden = true;
            document.body.classList.remove('expired');
            return;
        }

        document.body.classList.add('expired');

        if (isUnlocked) {
            countdownEl.textContent = 'Teste expirado';
            statusEl.textContent = 'ACESSO LIBERADO';
            messageEl.textContent = 'O prazo de teste venceu, mas este aparelho foi liberado por senha.';
            unlockPanel.hidden = true;
        } else {
            countdownEl.textContent = '00d 00h 00m 00s';
            statusEl.textContent = 'TESTE EXPIRADO';
            messageEl.textContent = 'O período de teste terminou. Insira a senha para liberar o app neste aparelho.';
            unlockPanel.hidden = false;
        }
    }

    function ensureAccess() {
        if (isExpired() && !isUnlocked) {
            updateTrialUI();
            const input = document.getElementById('unlockPassword');
            if (input) {
                input.focus();
            }
            return false;
        }
        return true;
    }

    function unlockApp() {
        const input = document.getElementById('unlockPassword');
        const msg = document.getElementById('unlockMessage');
        const typed = (input.value || '').trim().toUpperCase();

        msg.className = 'unlock-msg';

        if (typed === APP_UNLOCK_PASSWORD) {
            isUnlocked = true;
            localStorage.setItem(STORAGE_KEY_UNLOCK, '1');
            msg.textContent = 'Senha correta. App liberado neste aparelho.';
            msg.classList.add('success');
            input.value = '';
            updateTrialUI();
            return;
        }

        msg.textContent = 'Senha incorreta.';
        msg.classList.add('error');
    }

    function handleAction(tipo) {
        if (!ensureAccess()) return;
        goTo(tipo);
    }

    function handleInfo(tipo) {
        if (!ensureAccess()) return;
        openInfo(tipo);
    }

    // goTo: defined below

    function openInfo(tipo) {
        const title = document.getElementById('infoTitle');
        const text = document.getElementById('infoText');
        const modal = document.getElementById('infoModal');

        if (tipo === 'maquina') {
            title.innerText = '⚙️ Máquina';
            text.innerText = 'Usado para cronoanálise focada em ciclos de máquina. Mede tempos de ciclo, variação entre amostras, estabilidade, capacidade estimada, eficiência e gera relatório técnico com resumo executivo.';
        } else if (tipo === 'operacional') {
            title.innerText = '🧍 Operacional';
            text.innerText = 'Usado para cronoanálise operacional de atividades humanas, máquina e espera. Mede a sequência das etapas, tempos por elemento, classificação VA, NVA e BNVA e gera relatório visual para análise de balanceamento.';
        } else if (tipo === 'multi') {
            title.innerText = '⏱️ Multi cronômetro';
            text.innerText = 'Usado para acompanhar múltiplos tempos ao mesmo tempo. Ideal para comparar operações paralelas, postos simultâneos, testes concorrentes ou monitoramento de várias atividades em uma única tela.';
        } else if (tipo === 'trabalho-padrao') {
            title.innerText = '📸 Trabalho padrão';
            text.innerText = 'Área reservada para documentar o trabalho padrão com apoio visual. A proposta é combinar etapas, tempos, observações e fotos da operação em um formato simples de consulta.';
        } else {
            title.innerText = '📈 Calculadora de OEE';
            text.innerText = 'Área reservada para cálculo rápido de disponibilidade, performance, qualidade e OEE, com foco em apoio à análise de perdas e leitura rápida do resultado.';
        }

        modal.style.display = 'flex';
    }

    function closeInfo() {
        document.getElementById('infoModal').style.display = 'none';
    }

    document.addEventListener('DOMContentLoaded', function () {
        updateTrialUI();
        setInterval(updateTrialUI, 1000);

        const input = document.getElementById('unlockPassword');
        if (input) {
            input.addEventListener('keydown', function (event) {
                if (event.key === 'Enter') {
                    unlockApp();
                }
            });
        }
    });

    // ===== NAVEGACAO ENTRE APPS =====
    const APP_CONTENTS = {
      maquina:     `<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cronoanálise Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"><\/script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"><\/script>

    <style>
        /* Tema Dark Industrial - Tela Mobile */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --border: #333333;
            --green: #28a745;
            --red: #dc3545;
            --blue: #007bff;
            --yellow: #ffc107;
            --orange: #fd7e14;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 8px; 
            margin: 0; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            touch-action: manipulation; 
            user-select: none; 
            -webkit-user-select: none;
            padding-bottom: 110px;
        }
        
        #print-wrapper { display: flex; flex-direction: column; gap: 0; width: 100%; }

<div class="app-version" id="appVersion">v2.1</div>

<div id="exportContainer">

    <div class="print-header">
        <div>
            <h1>Relatório de Cronoanálise de Processos</h1>
            <p>Documento de controle de estabilidade e tempo padrão.</p>
        </div>
        <div style="text-align: right;">
            <p><strong>Data:</strong> <span id="printDate">--/--/----</span></p>
            <p><strong>Analista:</strong> <span id="printAnalyst">—</span></p>
        </div>
    </div>

    <div id="print-wrapper">
        <div class="col-1">
            <div class="card" id="configForm">
                <div class="config-grid">
                    <div class="input-group full-width">
                        <label>Equipamento / Operação</label>
                        <input type="text" id="equipName" placeholder="Ex: Torno CNC, Montagem..." >
                    </div>
                    <div class="input-group full-width">
                        <label>Analista Responsável</label>
                        <input type="text" id="analystName" placeholder="Nome de quem está medindo..." >
                    </div>
                    <div class="input-group">
                        <label class="label-with-info">Peças / Ciclo <span class="info-icon info-inline" onclick="showInfo('pecas_ciclo')">!</span></label>
                        <input type="number" id="units" value="1" min="1" inputmode="numeric" oninput="syncTargets('units')">
                    </div>
                    <div class="input-group">
                        <label>Medida de Capacidade</label>
                        <select id="timeUnit" onchange="changeTimeUnit()">
                            <option value="3600">Por Hora (un/h)</option>
                            <option value="60">Por Minuto (un/min)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label class="label-with-info">Takt Time (s) <span class="info-icon info-inline" onclick="showInfo('takt')">!</span></label>
                        <input type="number" id="takt" placeholder="Opcional" inputmode="numeric" oninput="syncTargets('takt')">
                    </div>
                    <div class="input-group">
                        <label id="lblTarget" class="label-with-info"><span id="lblTargetText">Meta (un/h)</span> <span class="info-icon info-inline" onclick="showInfo('meta')">!</span></label>
                        <input type="number" id="target" placeholder="Opcional" inputmode="numeric" oninput="syncTargets('target')">
                    </div>
                </div>
            </div>

            <div class="print-summary">
                <div><strong>Equipamento/Operação:</strong> <span id="printEquipName">—</span></div>
                <div><strong>Peças/Ciclo:</strong> <span id="printUnits">—</span></div>
                <div><strong>Capacidade Medida:</strong> <span id="printTimeUnit">—</span></div>
                <div><strong>Takt Time:</strong> <span id="printTakt">—</span></div>
                <div><strong>Meta de Produção:</strong> <span id="printTarget">—</span></div>
            </div>

            <div class="print-executive-summary" id="printExecutiveSummary">—</div>

            <div class="card">
                <div class="btn-row">
                    <button id="btnStart" class="btn-start" onclick="startTimer()">▶ Iniciar</button>
                    <button id="btnStop" class="btn-stop" onclick="stopTimer()" disabled>⏸ Pausar</button>
                    <button id="btnReset" class="btn-reset" onclick="resetTimer()">⏹ Zerar</button>
                </div>

                <div class="live-timer" id="liveTimer">00:00.00</div>

                <div class="total-timer-wrap">
                    <span class="total-timer-label">Tempo total de medição </span>
                    <span class="total-timer" id="totalTimer">00:00</span>
                </div>

                <div class="results-grid">
                    <div class="result-box">
                        <span class="info-icon" onclick="showInfo('amostras')">!</span>
                        <div class="result-title">AMOSTRAS (n)</div>
                        <span id="valSamples" class="result-value">0</span>
                    </div>
                    <div class="result-box">
                        <span class="info-icon" onclick="showInfo('capacidade')">!</span>
                        <div class="result-title" id="lblCapTitle">CAPACIDADE (un/h)</div>
                        <span id="valHourlyCap" class="result-value text-blue">0</span>
                    </div>
                    <div class="result-box">
                        <span class="info-icon" onclick="showInfo('ultimo')">!</span>
                        <div class="result-title">ÚLTIMO CICLO</div>
                        <span id="valLastCycle" class="result-value">0.00s</span>
                    </div>
                    <div class="result-box">
                        <span class="info-icon" onclick="showInfo('medio')">!</span>
                        <div class="result-title">CICLO MÉDIO</div>
                        <span id="valAvgCycle" class="result-value text-yellow">0.00s</span>
                    </div>
                    <div class="result-box">
                        <span class="info-icon" onclick="showInfo('minimo')">!</span>
                        <div class="result-title">MÍNIMO</div>
                        <span id="valMinCycle" class="result-value text-green">0.00s</span>
                    </div>
                    <div class="result-box">
                        <span class="info-icon" onclick="showInfo('maximo')">!</span>
                        <div class="result-title">MÁXIMO</div>
                        <span id="valMaxCycle" class="result-value text-red">0.00s</span>
                    </div>
                    <div class="result-box">
                        <span class="info-icon" onclick="showInfo('desvio')">!</span>
                        <div class="result-title">DESVIO PADRÃO</div>
                        <span id="valStdDev" class="result-value">0.00s</span>
                    </div>
                    <div class="result-box">
                        <span class="info-icon" onclick="showInfo('estabilidade')">!</span>
                        <div class="result-title">ÍNDICE DE ESTABIL.</div>

    function sanitizeFilename(name) {
        return String(name || 'arquivo')
            .normalize('NFD').replace(/[\\u0300-\\u036f]/g, '')
            .replace(/[^a-zA-Z0-9_-]+/g, '_')
            .replace(/_+/g, '_')
            .replace(/^_|_$/g, '') || 'arquivo';
    }

    
function generateExecutiveSummary() {
    const stats = calculateStats();
    if (!stats) return '—';

    const { n, avgCycle, minTime, maxTime, stdDev, estabilidade } = stats;
    const isHour = document.getElementById('timeUnit').value === '3600';
    const units = parseFloat(document.getElementById('units').value) || 1;
    const multiplier = parseInt(document.getElementById('timeUnit').value) || 3600;
    const taktVal = parseFloat(document.getElementById('takt').value) || 0;
    const unitLabel = isHour ? 'un/h' : 'un/min';
    const cap = document.getElementById('valHourlyCap')?.innerText || '0';
    const effEl = document.getElementById('valEfficiency');
    const range = maxTime - minTime;
    const cv = n > 1 ? (stdDev / avgCycle) * 100 : 0;

    // Confiabilidade da amostra
    let sampleMsg;
    if (n < 5)       sampleMsg = \`Amostragem insuficiente (n=\${n}) — colete ao menos 10 ciclos para confiabilidade estatística.\`;
    else if (n < 10) sampleMsg = \`Amostragem moderada (n=\${n}) — ampliar para ≥10 ciclos aumentará a precisão.\`;
    else if (n < 20) sampleMsg = \`Amostragem adequada (n=\${n}).\`;
    else             sampleMsg = \`Amostragem robusta (n=\${n}).\`;

    // Outliers (> média ± 2σ)
    const outliers = n > 1 ? laps.filter(l => Math.abs(l.time - avgCycle) > 2 * stdDev) : [];
    const outlierMsg = outliers.length > 0
        ? \` \${outliers.length} ciclo(s) fora de ±2σ detectado(s) (amostras: \${outliers.map(l => '#' + (laps.indexOf(l)+1)).join(', ')}) — verificar ocorrências atípicas.\`
        : '';

    // Estabilidade
    let stabMsg, stabAction;
    if (n <= 1) {
        stabMsg = 'Estabilidade indeterminada (amostra única).'; stabAction = '';
    } else if (estabilidade >= 95) {
        stabMsg = \`Processo altamente estável (IE: \${estabilidade.toFixed(1)}%, CV: \${cv.toFixed(1)}%).\`;
        stabAction = ' Processo sob controle — ciclo médio confiável para definição de tempo padrão.';
    } else if (estabilidade >= 85) {
        stabMsg = \`Boa estabilidade (IE: \${estabilidade.toFixed(1)}%, CV: \${cv.toFixed(1)}%).\`;
        stabAction = ' Variação aceitável. Investigar os ciclos extremos para consolidar o padrão.';
    } else if (estabilidade >= 70) {
        stabMsg = \`Variação relevante (IE: \${estabilidade.toFixed(1)}%, CV: \${cv.toFixed(1)}%).\`;
        stabAction = ' Recomenda-se identificar causas de variação antes de definir tempo padrão.';
    } else {
        stabMsg = \`Processo instável (IE: \${estabilidade.toFixed(1)}%, CV: \${cv.toFixed(1)}%).\`;
        stabAction = ' Ação corretiva necessária — processo imprevisível, não usar como referência sem investigação.';
    }

    // Comparação com Takt
    let taktMsg = '';
    if (taktVal > 0) {
        const aboveTakt = laps.filter(l => l.time > taktVal).length;
        const margin = ((taktVal - avgCycle) / taktVal * 100);
        if (avgCycle <= taktVal) {
            taktMsg = \` Ciclo médio \${margin.toFixed(1)}% abaixo do Takt (\${taktVal}s).\` +
                (aboveTakt > 0 ? \` Atenção: \${aboveTakt} ciclo(s) ultrapassaram o Takt — monitorar.\` : ' Todos os ciclos dentro do Takt.');
        } else {
            taktMsg = \` CRÍTICO: Ciclo médio \${Math.abs(margin).toFixed(1)}% acima do Takt (\${taktVal}s). \${aboveTakt}/\${n} ciclos fora do ritmo — capacidade insuficiente para atender a demanda. Revisar processo ou negociar Takt.\`;
        }
    }

    // Eficiência vs meta
    let effMsg = '';
    if (effEl && effEl.innerText !== '--') {
        const effVal = parseFloat(effEl.innerText);
        if (!isNaN(effVal)) {
            if (effVal >= 100)      effMsg = \` Eficiência de \${effEl.innerText} — meta atingida.\`;
            else if (effVal >= 90)  effMsg = \` Eficiência de \${effEl.innerText} — próxima da meta, pequeno ajuste no ciclo pode ser suficiente.\`;
            else if (effVal >= 75)  effMsg = \` Eficiência de \${effEl.innerText} — gap moderado. Analisar perdas e fontes de variação.\`;
            else                    effMsg = \` Eficiência de \${effEl.innerText} — gap crítico. Reavaliar método, layout ou balanceamento da operação.\`;
        }
    }

    return \`\${sampleMsg} Ciclo médio: \${avgCycle.toFixed(2)}s | Mín: \${minTime.toFixed(2)}s | Máx: \${maxTime.toFixed(2)}s | Amplitude: \${range.toFixed(2)}s | Desvio: \${stdDev.toFixed(2)}s.\${outlierMsg} \${stabMsg}\${stabAction}\${taktMsg}\${effMsg} Capacidade estimada: \${cap} \${unitLabel}.\`;
}


function getExecutiveSummaryText() {
    return generateExecutiveSummary();
}

    function dataUrlToBlob(dataUrl) {
        const parts = dataUrl.split(',');
        const mime = parts[0].match(/:(.*?);/)[1];
        const byteString = atob(parts[1]);
        const ab = new ArrayBuffer(byteString.length);
        const ia = new Uint8Array(ab);
        for (let i = 0; i < byteString.length; i++) {
            ia[i] = byteString.charCodeAt(i);
        }
        return new Blob([ab], { type: mime });
    }

    async function generateImageData(borderPx = 0) {
  const container = await prepareCapture();
  try {
    const canvas = await html2canvas(container, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
    if (!borderPx || borderPx <= 0) return canvas.toDataURL('image/png');
    const bordered = document.createElement('canvas');
    bordered.width = canvas.width + (borderPx * 2);
    bordered.height = canvas.height + (borderPx * 2);
    const ctx = bordered.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, bordered.width, bordered.height);
    ctx.drawImage(canvas, borderPx, borderPx);
    return bordered.toDataURL('image/png');
  } finally {
    restoreCapture();
  }
}

    async function generateRealPDF() {
        const btn = document.getElementById('btnPDF');
        const oldText = btn.innerText;
        btn.innerText = "⏳ Gerando...";
        btn.disabled = true;

        try {
            const imgData = await generateImageData(0);
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pdfW = pdf.internal.pageSize.getWidth();
            const pdfH = pdf.internal.pageSize.getHeight();

            const img = new Image();
            img.src = imgData;
            await new Promise(r => img.onload = r);

            const imgHmm = img.height * (pdfW / img.width);

            if (imgHmm <= pdfH) {
                pdf.addImage(imgData, 'PNG', 0, 0, pdfW, imgHmm, undefined, 'FAST');
            } else {
                // Multi-página
                const pxPerMm = img.width / pdfW;
                const pageHeightPx = pdfH * pxPerMm;
                let offsetPx = 0, page = 0;
                while (offsetPx < img.height) {
                    if (page > 0) pdf.addPage();
                    const sliceH = Math.min(pageHeightPx, img.height - offsetPx);
                    const c = document.createElement('canvas');
                    c.width = img.width; c.height = Math.ceil(sliceH);
                    c.getContext('2d').drawImage(img, 0, -offsetPx);
                    pdf.addImage(c.toDataURL('image/png'), 'PNG', 0, 0, pdfW, c.height / pxPerMm, undefined, 'FAST');
                    offsetPx += pageHeightPx; page++;
                }
            }
            pdf.save(\`Cronoanalise_\${Date.now()}.pdf\`);
        } catch(e) {
            alert("Erro ao gerar PDF.");
        } finally {
            btn.innerText = oldText;
            btn.disabled = false;
        }
    }

    }

    function syncTargets(source) {
        let units = parseFloat(document.getElementById('units').value) || 1;
        let multiplier = parseInt(document.getElementById('timeUnit').value) || 3600;
        let taktInput = document.getElementById('takt');
        let targetInput = document.getElementById('target');

        if (source === 'takt' && taktInput.value) {
            let t = parseFloat(taktInput.value);
            if(t > 0) targetInput.value = Math.round((multiplier / t) * units);
        } else if (source === 'target' && targetInput.value) {
            let tg = parseFloat(targetInput.value);
            if(tg > 0) taktInput.value = ((multiplier / tg) * units).toFixed(2);
        } else if (source === 'units' || source === 'unitType') {
            if(taktInput.value) {
                let t = parseFloat(taktInput.value);
                if(t > 0) targetInput.value = Math.round((multiplier / t) * units);
            }
        }
    }

    function formatTime(ms) {
        let totalSeconds = ms / 1000;
        let mins = Math.floor(totalSeconds / 60);
        let secs = Math.floor(totalSeconds % 60);
        let millis = Math.floor((ms % 1000) / 10);
        return \`\${mins.toString().padStart(2, '0')}:\${secs.toString().padStart(2, '0')}.\${millis.toString().padStart(2, '0')}\`;
    }

    function updateLiveTimer() {
        if (!isRunning) return;
        let currentTime = Date.now();
        document.getElementById('liveTimer').innerText = formatTime(currentTime - lastLapTime);
        updateTotalTimer();
        timerAnimation = requestAnimationFrame(updateLiveTimer);
    }

    function startTimer() {
        isRunning = true;
        let now = Date.now();
        lastLapTime = elapsedBeforePause > 0 ? now - elapsedBeforePause : now;
        elapsedBeforePause = 0;
        studyStartTime = now; // inicia ou retoma contagem total

    function stopTimer() {

    function recordLap() {

    function calculateStats() {
        const n = laps.length;
        if (n === 0) return null;
        
        const times = laps.map(l => l.time);
        const minTime = Math.min(...times);
        const maxTime = Math.max(...times);
        const sum = times.reduce((acc, t) => acc + t, 0);
        const avgCycle = sum / n;

        let stdDev = 0;
        let estabilidade = 100.0;

        if (n > 1) {
            const sumSq = times.reduce((acc, t) => acc + Math.pow(t - avgCycle, 2), 0);
            stdDev = Math.sqrt(sumSq / (n - 1));
            const cv = (stdDev / avgCycle) * 100;
            estabilidade = Math.max(0, 100 - cv);
        }

        return { n, times, minTime, maxTime, avgCycle, stdDev, estabilidade };
    }

        let elLastCycle = document.getElementById('valLastCycle');

        document.getElementById('valAvgCycle').innerText = stats.avgCycle.toFixed(2) + "s";

        let elEst = document.getElementById('valEstabilidade');

        let elEff = document.getElementById('valEfficiency');

        } else {
            elEff.innerText = "--";
            elEff.className = "result-value";
        }

        renderHistory();
        renderChart(takt, stats.avgCycle, stats.maxTime);
        renderHistogram(stats.minTime, stats.maxTime, stats.avgCycle, stats.n, takt);
    }

    function renderHistory() {

    function renderChart(takt, avgCycle, maxTime) {
        const chart = document.getElementById('chartContainer');
        chart.innerHTML = "";
        
        if (takt > maxTime) maxTime = takt;

        if (takt > 0) {

 let lbl = document.createElement('span');
 lbl.className = 'sample-label';
 lbl.innerText = (idx + 1);
 bar.appendChild(lbl);
 chart.appendChild(bar);
        });
    }

    function renderHistogram(minTime, maxTime, avgCycle, n, takt) {
    const hist = document.getElementById('histogramContainer');
    hist.innerHTML = "";

    const rangeTotal = Math.max(maxTime - minTime, 0.001);
    const clamp01 = (x) => Math.min(1, Math.max(0, x));

    const placeHistLine = (value, type, label) => {
        const pct = clamp01((value - minTime) / rangeTotal);
        const x = pct * 100;
        const line = document.createElement('div');
        line.className = \`hist-vline \${type}\`;
        line.style.left = \`\${x}%\`;
        hist.appendChild(line);

        const lbl = document.createElement('div');
        lbl.className = \`hist-vlabel \${type}\`;
        lbl.style.left = \`\${x}%\`;
        lbl.innerText = label;
        hist.appendChild(lbl);
    };

    const appendTaktSummary = () => {
        if (takt && takt > 0) {
            const dentro = laps.filter(l => l.time <= takt).length;
            const total = n || laps.length || 0;
            const pct = total > 0 ? Math.round((dentro / total) * 100) : 0;
            const summary = document.createElement('div');
            summary.className = 'hist-takt-summary';
            summary.innerText = \`Dentro do Takt: \${dentro}/\${total} (\${pct}%)\`;
            hist.appendChild(summary);
        }
    };

    const drawRefs = () => {
        if (avgCycle && avgCycle > 0) placeHistLine(avgCycle, 'mean', \`MÉDIA: \${avgCycle.toFixed(2)}s\`);
        if (takt && takt > 0) placeHistLine(takt, 'takt', \`TAKT: \${takt.toFixed(2)}s\`);
        appendTaktSummary();
    };

    if (n === 1 || minTime === maxTime) {
        let col = document.createElement('div');
        col.className = 'hist-col';
        col.innerHTML = \`<span class="hist-label">\${n}</span><div class="hist-bar" style="height: 100%;"></div><span class="hist-x-label">\${minTime.toFixed(1)}s</span>\`;
        hist.appendChild(col);
        drawRefs();
        return;
    }

    let binCount = n < 10 ? 3 : (n < 20 ? 5 : 7);
    let binWidth = (rangeTotal * 1.01) / binCount;
    let bins = Array(binCount).fill(0);

    laps.forEach(lap => {
        let index = Math.floor((lap.time - minTime) / binWidth);
        if (index >= binCount) index = binCount - 1;
        if (index < 0) index = 0;
        bins[index]++;
    });

    let maxFreq = Math.max(...bins);

    bins.forEach((freq, i) => {
        let col = document.createElement('div');
        col.className = 'hist-col';

        if (freq > 0) {
            let label = document.createElement('span');
            label.className = 'hist-label';
            label.innerText = freq;
            col.appendChild(label);
        }

        let bar = document.createElement('div');
        bar.className = 'hist-bar';
        bar.style.height = maxFreq > 0 ? \`\${(freq / maxFreq) * 100}%\` : '0%';
        col.appendChild(bar);

        let binStart = minTime + (i * binWidth);
        let binEnd = minTime + ((i + 1) * binWidth);

        let xLabel = document.createElement('span');
        xLabel.className = 'hist-x-label';
        xLabel.innerText = \`\${binStart.toFixed(1)}–\${binEnd.toFixed(1)}\`;
        col.appendChild(xLabel);

        hist.appendChild(col);
    });

    drawRefs();
}

<script>

  metaCiclo: { title: 'Meta do ciclo (padrão) (hh:mm:ss)', text: 'Tempo-alvo total para concluir o ciclo padrão. Digite em hh:mm:ss (preenchimento da direita para a esquerda). Ao finalizar, o tempo total ficará VERDE se estiver dentro da meta e VERMELHO se exceder.' },

  va: { title: 'VA — Agrega valor', text: 'Atividade que transforma o produto/serviço de forma que o cliente reconhece valor direto.' },
  nva: { title: 'NVA — Não agrega valor', text: 'Atividade que não agrega valor ao cliente e representa desperdício.' },
  bnva: { title: 'BNVA — Necessário', text: 'Atividade que não agrega valor direto, mas é necessária no processo atual.' },
  gantt: { title: 'Gráfico do ciclo (Yamazumi)', text: 'Cada barra representa uma etapa proporcional ao tempo dela no ciclo. No relatório, cada etapa é identificada por 01, 02… logo abaixo da faixa VA (verde/vermelha).' },
  history: { title: 'Detalhes das etapas', text: 'Sequência das etapas com tipo, classificação, tempo, % do ciclo e descrição.' }
};
function showInfo(key) {
        const item = glossario[key];

    let isRunning = false;
    let cycleStartTime = 0;

    let elementCounterId = 0; 
    let timerAnimation;
    let editingElementId = null;

    function openManualModal(id = null) {
        editingElementId = id;
        
        if (id) {
            document.getElementById('modalMainTitle').innerText = "✏️ Editar Etapa";
            document.getElementById('btnSaveManual').innerText = "Salvar Ajuste";
            let el = elements.find(e => e.id === id);
            document.getElementById('manualDesc').value = el.desc;
            document.getElementById('manualTime').value = el.time;
            document.getElementById('manualUnit').value = "1"; 
            document.getElementById('manualType').value = el.type;
            document.getElementById('manualVa').value = el.va;
        } else {
            document.getElementById('modalMainTitle').innerText = "➕ Adicionar Nova Etapa";
            document.getElementById('btnSaveManual').innerText = "Adicionar";
            document.getElementById('manualDesc').value = '';
            document.getElementById('manualTime').value = '';
            document.getElementById('manualUnit').value = "1";
            document.getElementById('manualType').value = 'processo';
            document.getElementById('manualVa').value = 'va';
        }
        document.getElementById('manualModal').style.display = 'flex';
    }

    function closeManualModal() {
        document.getElementById('manualModal').style.display = 'none';
        editingElementId = null;
    }

    function saveManualTime() {
        let timeInput = parseFloat(document.getElementById('manualTime').value);
        if (!timeInput || timeInput <= 0) {
            alert("Insira um tempo válido.");
            return;
        }
        
        let unitMult = parseInt(document.getElementById('manualUnit').value);
        let finalSeconds = timeInput * unitMult;
        let type = document.getElementById('manualType').value;
        let vaClass = document.getElementById('manualVa').value;
        let desc = document.getElementById('manualDesc').value.trim();

        if (editingElementId) {
            let el = elements.find(e => e.id === editingElementId);
            if (el) {
                el.time = finalSeconds;
                el.type = type;
                el.va = vaClass;
                el.desc = desc;
            }
        } else {
            elementCounterId++;
            elements.push({ 
                id: elementCounterId, 
                type: type, 
                time: finalSeconds, 
                va: vaClass,
                desc: desc 
            });

            if (isRunning) {
                cycleStartTime -= (finalSeconds * 1000);
            }
        }

        closeManualModal();
        updateUI();
        saveToStorage();
    }

    async function prepareCapture() {
        const equipName = document.getElementById('equipName').value.trim() || 'Não Informado';
        document.getElementById('printEquipName').innerText = equipName;

        const analyst = document.getElementById('analystName').value.trim() || 'Não informado';
        document.getElementById('printAnalyst').innerText = analyst;

        let hoje = new Date();
        document.getElementById('printDate').innerText = hoje.toLocaleDateString('pt-BR') + " às " + hoje.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

        document.body.classList.add('export-mode');
        
        document.querySelectorAll('.history-row').forEach(row => {
            let input = row.querySelector('.element-desc');
            let span = row.querySelector('.element-desc-print');
            if(input && span) {
                span.innerText = input.value || '—';
            }
        });

        await new Promise(r => setTimeout(r, 200));
        return document.getElementById('exportContainer');
    }

    function restoreCapture() {
        document.body.classList.remove('export-mode');
    }


    function downloadBlob(blob, fileName) {
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setTimeout(() => URL.revokeObjectURL(url), 1500);
    }

    async function generateImageBlob() {
        const container = await prepareCapture();
        try {
            const canvas = await html2canvas(container, {
                scale: 2,
                useCORS: true,
                backgroundColor: '#ffffff',
                logging: false,
                windowWidth: container.scrollWidth,
                windowHeight: container.scrollHeight
            });
            return await new Promise((resolve, reject) => {
                canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error('Falha ao converter canvas em PNG.')), 'image/png');
            });
        } finally {
            restoreCapture();
        }
    }

    async function generatePNG() {
        const btn = document.getElementById('btnPNG');

    function csvEscape(value) {
        const text = String(value ?? '').replace(/[\\r\\n]+/g, ' ').trim();
        return text.replace(/;/g, ',');
    }

    function sanitizeFilename(name) {
        return String(name || 'arquivo')
            .normalize('NFD').replace(/[\\u0300-\\u036f]/g, '')
            .replace(/[^a-zA-Z0-9_-]+/g, '_')
            .replace(/_+/g, '_')
            .replace(/^_|_$/g, '') || 'arquivo';
    }

    async function generatePDFBlob() {
        const pngBlob = await generateImageBlob();
        const imgDataUrl = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(pngBlob);
        });

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const pdfW = pdf.internal.pageSize.getWidth();   // 210mm
        const pdfH = pdf.internal.pageSize.getHeight();  // 297mm

        const img = new Image();
        img.src = imgDataUrl;
        await new Promise(r => img.onload = r);

        const imgWmm = pdfW;
        const imgHmm = img.height * (pdfW / img.width);

        if (imgHmm <= pdfH) {
            pdf.addImage(imgDataUrl, 'PNG', 0, 0, imgWmm, imgHmm, undefined, 'FAST');
        } else {
            // Multi-página: fatia a imagem em blocos de altura A4
            const pxPerMm = img.width / pdfW;
            const pageHeightPx = pdfH * pxPerMm;
            let offsetPx = 0;
            let page = 0;
            while (offsetPx < img.height) {
                if (page > 0) pdf.addPage();
                const sliceH = Math.min(pageHeightPx, img.height - offsetPx);
                const c = document.createElement('canvas');
                c.width = img.width;
                c.height = Math.ceil(sliceH);
                c.getContext('2d').drawImage(img, 0, -offsetPx);
                const sliceHmm = c.height / pxPerMm;
                pdf.addImage(c.toDataURL('image/png'), 'PNG', 0, 0, pdfW, sliceHmm, undefined, 'FAST');
                offsetPx += pageHeightPx;
                page++;
            }
        }
        return pdf.output('blob');
    }

    async function shareWhatsApp() {
        const btn = document.getElementById('btnWhatsApp');
        const oldText = btn.innerText;
        btn.innerText = "⏳ ...";
        btn.disabled = true;

        try {
            const equipName = document.getElementById('equipName').value.trim() || 'Operação não informada';
            const safeBase = sanitizeFilename(equipName || 'cronoanalise');
            const shareText = buildWhatsAppSummary();

            // WhatsApp costuma falhar ou ignorar anexos quando recebe múltiplos arquivos
            // ou mistura PDF + imagem via Web Share API. Por isso, o fluxo foi
            // padronizado para compartilhar diretamente apenas o PNG.
            const pngBlob = await generateImageBlob();
            const pngFile = new File([pngBlob], \`Balanceamento_\${safeBase}.png\`, { type: 'image/png' });

            if (navigator.share) {
                try {
                    if (!navigator.canShare || navigator.canShare({ files: [pngFile] })) {
                        await navigator.share({
                            title: \`Cronoanálise - \${equipName}\`,
                            text: shareText,
                            files: [pngFile]
                        });
                        return;
                    }
                } catch (shareErr) {
                    console.warn('Compartilhamento direto com anexo não concluído.', shareErr);
                }
            }

            // Fallback: envia o resumo ao WhatsApp e baixa o PNG para anexar manualmente.
            downloadBlob(pngBlob, \`Balanceamento_\${safeBase}.png\`);
            const waUrl = \`https://wa.me/?text=\${encodeURIComponent(shareText + "\\\\n\\\\n📎 O PNG do relatório foi baixado no aparelho para anexar manualmente.")}\`;
            window.open(waUrl, '_blank');
            alert('O WhatsApp recebeu o resumo executivo. O PNG do relatório foi baixado no aparelho para anexar manualmente.');
        } catch (e) {
            console.error(e);
            alert('Erro ao preparar compartilhamento no WhatsApp.');
        } finally {
            btn.innerText = oldText;
            btn.disabled = elements.length === 0;
        }
    }

    function exportToExcel() {
        if (elements.length === 0) return;

        const equipName = document.getElementById('equipName').value.trim() || 'Nao_Identificado';
        const safeFileName = sanitizeFilename(equipName);
        const lines = [
            \`Equipamento/Operacao;\${csvEscape(equipName)}\`,
            '',
            'Ordem;Responsavel;Analise VA;Tempo (s);Descricao'
        ];

        elements.forEach((el, index) => {
            const tipo = el.type === 'pessoa' ? 'Operador' : (el.type === 'maquina' ? 'Maquina' : 'Processo/Espera');
            const analise = (el.va || '').toUpperCase();
            const tempo = String(el.time.toFixed(2)).replace('.', ',');
            const desc = csvEscape(el.desc || 'Sem descricao');
            lines.push(\`\${index + 1};\${tipo};\${analise};\${tempo};\${desc}\`);
        });

        const csvContent = '\\uFEFF' + lines.join('\\r\\n');
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        downloadBlob(blob, \`balanceamento_\${safeFileName}.csv\`);
    }

    function formatGoalInput(el) {
  const digitsRaw = String(el.value || '').replace(/\\D/g, '').slice(-6);
  if (!digitsRaw) {
    el.value = '';
    updateGoalStatus();
    return;
  }
  const digits = digitsRaw.padStart(6, '0');
  const hh = digits.slice(0, 2);
  const mm = digits.slice(2, 4);
  const ss = digits.slice(4, 6);
  el.value = \`\${hh}:\${mm}:\${ss}\`;
  try { el.setSelectionRange(el.value.length, el.value.length); } catch(e) {}
  updateGoalStatus();
}

function getGoalSeconds() {
  const el = document.getElementById('goalTime');
  if (!el) return null;
  const v = String(el.value || '').trim();
  if (!v) return null;
  if (v.includes(':')) {
    const parts = v.split(':').map(p => parseInt(p, 10));
    if (parts.length === 3 && parts.every(n => Number.isFinite(n))) {
      const [hh, mm, ss] = parts;
      return (hh * 3600) + (mm * 60) + ss;
    }
    if (parts.length === 2 && parts.every(n => Number.isFinite(n))) {
      const [mm, ss] = parts;
      return (mm * 60) + ss;
    }
    return null;
  }
  const num = parseFloat(v.replace(',', '.'));
  if (!num || num <= 0) return null;
  return num;
}

function updateGoalStatus() {
  const goal = getGoalSeconds();
  const liveEl = document.getElementById('liveTimer');
  const totalEl = document.getElementById('valTempoTotal');
  if (!totalEl) return;

  if (liveEl) liveEl.classList.remove('text-green', 'text-red');
  totalEl.classList.remove('text-green', 'text-red');

  if (!goal) return;

  let totalSec = 0;
  if (isRunning) totalSec = (Date.now() - cycleStartTime) / 1000;
  else {
    const txt = (totalEl.innerText || '').replace('s','').trim().replace(',', '.');
    totalSec = parseFloat(txt) || 0;
  }

  const ok = totalSec <= goal;
  if (liveEl) liveEl.classList.add(ok ? 'text-green' : 'text-red');
  totalEl.classList.add(ok ? 'text-green' : 'text-red');
}

function formatTime(ms) {
  const totalSeconds = ms / 1000;
  if (totalSeconds < 3600) {
    const mins = Math.floor(totalSeconds / 60);
    const secs = Math.floor(totalSeconds % 60);
    const centis = Math.floor((ms % 1000) / 10);
    return \`\${mins.toString().padStart(2,'0')}:\${secs.toString().padStart(2,'0')}.\${centis.toString().padStart(2,'0')}\`;
  }
