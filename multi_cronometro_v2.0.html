<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Multi Cronometro v2.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #202228; --panel: #111315; --panel-2: #171a1f;
      --text: #ecf0f3; --muted: #9ea6af; --brand: #0a6788;
      --green: #4b8f0e; --blue: #1996d2; --red: #cc2a1d;
      --orange: #ff8a00; --shadow: 0 10px 24px rgba(0,0,0,.28);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, Segoe UI, Roboto, system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #0a6788 0 80px, var(--bg) 80px 100%);
      overflow: hidden;
    }
    button, input, select, textarea { font: inherit; }
    .app {
      min-height: 100dvh; display: grid;
      grid-template-rows: auto 1fr;
      max-width: 820px; margin: 0 auto; background: transparent;
    }

    /* ===== HEADER COMPACTO ===== */
    .app-header {
      position: sticky; top: 0; z-index: 20;
      margin: 8px 10px 0; padding: 8px 12px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.08);
      background: linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02)), #171b20;
      box-shadow: 0 8px 24px rgba(0,0,0,.22);
      backdrop-filter: blur(10px);
    }
    .hrow1 {
      display: flex; align-items: center; gap: 8px;
    }
    .hrow2 {
      display: flex; align-items: center; gap: 8px;
      margin-top: 7px; padding-top: 7px;
      border-top: 1px solid rgba(255,255,255,.06);
    }
    .brand {
      display: flex; align-items: center; gap: 7px; flex: 1; min-width: 0;
    }
    .brand-icon {
      width: 34px; height: 34px; border-radius: 10px;
      display: grid; place-items: center;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.08);
      font-size: 1.1rem; flex: 0 0 auto;
    }
    .brand-title {
      margin: 0; font-size: .95rem; font-weight: 800;
      letter-spacing: -.02em; color: #fff; white-space: nowrap;
    }
    /* Botoes de acao no header */
    .hactions { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
    .hbtn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 4px; border: 0; cursor: pointer;
      height: 34px; border-radius: 9px;
      font-weight: 700; font-size: .82rem;
      padding: 0 10px;
      transition: opacity .15s, transform .12s;
      white-space: nowrap;
    }
    .hbtn:active { transform: scale(.93); opacity: .8; }
    .hbtn .hi { font-size: .95rem; line-height: 1; }
    .hbtn-add   { background: rgba(255,255,255,.1); color: #fff; }
    .hbtn-play  { background: var(--green); color: #fff; min-width: 34px; }
    .hbtn-reset { background: rgba(255,255,255,.06); color: #ccc; border: 1px solid rgba(255,255,255,.1); min-width: 34px; }
    .ht { /* btn text label */ }

    /* Tabs */
    .htabs {
      display: inline-flex; gap: 3px; padding: 3px;
      border-radius: 11px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      flex-shrink: 0;
    }
    .htabs .tab {
      border: 0; height: 28px; padding: 0 11px;
      border-radius: 8px; background: transparent;
      color: var(--muted); font-weight: 600; font-size: .8rem;
      cursor: pointer; transition: all .2s;
    }
    .htabs .tab.active { background: rgba(255,255,255,.1); color: #fff; }

    /* Chips de estatistica */
    .hstats { display: flex; gap: 5px; flex: 1; justify-content: flex-end; }
    .schip {
      display: inline-flex; align-items: center; gap: 3px;
      height: 28px; padding: 0 8px; border-radius: 999px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      color: var(--muted); font-size: .78rem;
    }
    .schip strong { color: #fff; font-size: .82rem; font-weight: 800; }
    .schip .sl { /* label text */ }

    /* Mobile: icones sem texto */
    @media (max-width: 500px) {
      .ht { display: none; }
      .hbtn { padding: 0 9px; }
      .sl { display: none; }
      .schip { padding: 0 7px; }
      .brand-title { font-size: .88rem; }
    }
    @media (max-width: 360px) {
      .hstats .schip:nth-child(3) { display: none; }
    }

    /* ===== BOTOES GLOBAIS ===== */
    .icon-btn, .pill, .action-btn, .ghost-btn, .menu-btn {
      border: 0; cursor: pointer;
      transition: transform .16s, opacity .16s, background .16s;
    }
    .icon-btn:hover,.pill:hover,.action-btn:hover,.ghost-btn:hover,.menu-btn:hover { transform: translateY(-1px); }
    .icon-btn {
      width: 40px; height: 40px; border-radius: 999px;
      background: rgba(255,255,255,.12); color: white;
      display: grid; place-items: center; font-size: 18px;
    }
    .pill { background: #2a2f35; color: var(--text); border-radius: 999px; padding: 10px 14px; font-weight: 800; box-shadow: inset 0 0 0 1px rgba(255,255,255,.06); }
    .pill.primary { background: var(--green); color: white; }

    /* ===== CONTEUDO ===== */
    .page { display: none; }
    .page.active { display: block; }
    .content { min-height: 0; padding: 10px 10px calc(12px + var(--safe-bottom)); overflow: hidden; }
    .grid-shell { height: 100%; min-height: 0; display: grid; overflow: hidden; }
    .grid {
      height: 100%; display: grid; gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-content: stretch; min-height: 0;
    }
    .grid.count-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
    .grid.count-2 { grid-template-rows: 1fr; }
    .grid.count-3, .grid.count-4 { grid-template-rows: repeat(2, minmax(0, 1fr)); }
    .grid.count-many { grid-template-columns: repeat(2,minmax(0,1fr)); grid-auto-rows: minmax(220px,1fr); align-content: start; overflow-y: auto; padding-bottom: 90px; }

    .card {
      position: relative; cursor: pointer;
      background: linear-gradient(180deg, #111315, #171a1f 45%, #13161a 100%);
      border-radius: 0; border: 1px solid rgba(255,255,255,.045);
      box-shadow: var(--shadow); overflow: hidden; padding: 12px;
      min-height: 0; display: flex; flex-direction: column;
      justify-content: space-between; isolation: isolate;
    }
    .card::before { content: ''; position: absolute; inset: 0 auto 0 0; width: 4px; background: var(--accent, var(--blue)); }
    .card.favorite::after { content: "\2605"; position: absolute; left: 10px; top: 8px; color: rgba(255,255,255,.42); font-size: 19px; }
    .card-head { display: flex; justify-content: space-between; align-items: start; gap: 8px; position: relative; }
    .card-title-wrap { min-width: 0; }
    .card-title { margin: 0; font-size: 1.12rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 4px; color: #e3e7eb; }
    .card-sub { margin-top: 3px; color: var(--muted); font-size: .86rem; min-height: 1.1em; }
    .card-actions-top { cursor: default; display: flex; gap: 6px; align-items: center; position: relative; z-index: 4; }
    .menu-btn { width: 34px; height: 34px; border-radius: 12px; background: rgba(255,255,255,.06); color: white; display: grid; place-items: center; font-size: 18px; }
    .time-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 4px; min-height: 0; flex: 1; padding: 4px 0 6px; }
    .time { font-variant-numeric: tabular-nums; letter-spacing: -.035em; line-height: .95; display: flex; align-items: baseline; justify-content: center; gap: 4px; flex-wrap: wrap; font-size: clamp(2rem,9vw,3.5rem); margin: 0; color: #e6eaee; }
    .time .accent { color: var(--orange); }
    .time .ms { font-size: .42em; color: var(--orange); font-weight: 800; }
    .lap-inline { display: inline-flex; align-items: center; gap: 6px; padding: 2px 8px; border-radius: 999px; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.08); color: #36d56e; font-size: .96rem; font-weight: 800; max-width: 100%; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .lap-inline .lap-badge { border: 1px solid rgba(255,255,255,.18); border-radius: 8px; padding: 0 6px; color: #66b6ff; font-size: .84em; background: rgba(255,255,255,.03); }
    .laps-inline-list { margin-top: 8px; display: grid; gap: 3px; min-height: 54px; max-height: 70px; overflow: hidden; }
    .lap-row { display: grid; grid-template-columns: 28px 1fr 1fr; gap: 8px; font-size: .83rem; color: #d8dde2; font-variant-numeric: tabular-nums; align-items: center; }
    .lap-row .idx { color: #33a6ff; font-weight: 800; }
    .lap-row .cum { color: #9ea6af; }
    .lap-empty { color: #808892; font-size: .86rem; }
    .controls { cursor: default; display: grid; grid-template-columns: minmax(62px,.85fr) minmax(76px,1.15fr); gap: 8px; align-items: stretch; margin-top: auto; min-height: 0; }
    .action-btn, .ghost-btn { min-height: 48px; border-radius: 12px; color: white; font-weight: 900; display: grid; place-items: center; position: relative; overflow: hidden; cursor: pointer; }
    .ghost-btn { background: #66676b; }
    .action-btn { background: var(--accent, var(--blue)); }
    .action-btn.pause { background: var(--red); }
    .ghost-btn.disabled { opacity: .44; pointer-events: none; }
    .btn-label { display: inline-flex; align-items: center; justify-content: center; gap: 8px; min-width: 0; }
    .btn-label .icon { font-size: 1.18rem; }
    .detail-panel { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.07); border-radius: 18px; padding: 12px; }
    .single-layout { display: grid; grid-template-columns: minmax(0,1.15fr) minmax(280px,.85fr); gap: 14px; }
    @media (max-width: 720px) { .single-layout { grid-template-columns: 1fr; } .grid.count-many { grid-template-columns: 1fr; } }
    .stats { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 10px; margin: 10px 0 12px; }
    .stat { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.06); border-radius: 14px; padding: 10px; }
    .stat .label { color: var(--muted); font-size: .84rem; }
    .stat .value { margin-top: 4px; font-weight: 900; font-variant-numeric: tabular-nums; }
    .sparkline { width: 100%; height: 118px; display: block; }
    .menu { position: absolute; top: 40px; right: 0; min-width: 210px; background: #2b2d31; border-radius: 16px; border: 1px solid rgba(255,255,255,.08); box-shadow: var(--shadow); padding: 8px; z-index: 10; }
    .menu.hidden { display: none; }
    .menu button { width: 100%; border: 0; background: transparent; color: #edf1f4; text-align: left; padding: 12px; border-radius: 10px; cursor: pointer; font-size: .97rem; }
    .menu button:hover { background: rgba(255,255,255,.08); }
    .empty-state { height: 100%; display: grid; place-items: center; text-align: center; padding: 20px; border: 1px dashed rgba(255,255,255,.14); border-radius: 22px; color: #c7cdd4; background: rgba(255,255,255,.03); }
    .empty-state h3 { margin: 8px 0; }
    .empty-state p { color: var(--muted); max-width: 32ch; }
    .fab { position: fixed; right: 20px; bottom: calc(20px + var(--safe-bottom)); width: 56px; height: 56px; border-radius: 999px; border: 0; cursor: pointer; background: #0a6f94; color: white; font-size: 1.7rem; box-shadow: 0 14px 28px rgba(0,0,0,.35), inset 0 -4px 0 rgba(0,0,0,.18); z-index: 22; display: grid; place-items: center; }
    .modal { position: fixed; inset: 0; display: none; place-items: center; background: rgba(0,0,0,.56); backdrop-filter: blur(6px); z-index: 30; padding: 16px; }
    .modal.show { display: grid; }
    .dialog { width: min(760px,calc(100vw - 24px)); max-height: min(92dvh,860px); overflow: auto; background: linear-gradient(180deg,#1b1e23,#121417 100%); border-radius: 24px; border: 1px solid rgba(255,255,255,.08); box-shadow: var(--shadow); }
    .dialog-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 18px 20px 10px; border-bottom: 1px solid rgba(255,255,255,.06); }
    .dialog-head h3 { margin: 0; }
    .dialog-body { padding: 18px 20px; }
    .dialog-foot { display: flex; justify-content: flex-end; gap: 10px; padding: 12px 20px 20px; }
    .form-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 14px; }
    .countdown-setup { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 14px; margin-top: 14px; }
    @media (max-width: 580px) { .form-grid { grid-template-columns: 1fr; } }
    .field { display: flex; flex-direction: column; gap: 8px; }
    label { color: #c9d0d7; font-size: .95rem; }
    input[type="text"],input[type="color"],input[type="number"],textarea { width: 100%; border: 1px solid rgba(255,255,255,.1); background: #111317; color: var(--text); border-radius: 14px; padding: 12px 14px; }
    input[type="color"] { height: 48px; padding: 4px; }
    textarea { min-height: 180px; resize: vertical; }
    table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
    th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,.07); }
    th { color: #abb3bb; }
    .toast { position: fixed; left: 50%; bottom: calc(14px + var(--safe-bottom)); transform: translateX(-50%); background: #111317; color: white; padding: 12px 16px; border-radius: 999px; border: 1px solid rgba(255,255,255,.12); box-shadow: var(--shadow); z-index: 40; display: none; max-width: calc(100vw - 24px); text-align: center; }
    .toast.show { display: block; }
    .hidden { display: none !important; }
    .small { color: var(--muted); font-size: .9rem; }
    @media (max-width: 400px) { .content { padding-inline: 8px; } .card { padding: 10px; } .time { font-size: clamp(1.8rem,8.2vw,2.9rem); } .controls { gap: 6px; } .action-btn,.ghost-btn { min-height: 44px; } }
  </style>
</head>
<body>
